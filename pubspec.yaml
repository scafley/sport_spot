name: sport_spot
description: "A Flutter app for organizing local sports activities."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons:
    ^1.0.8

    # State management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4

  # DI
  get_it: ^8.0.2
  injectable: ^2.4.4

  #router
  auto_route: ^11.1.0

  # Network
  dio: ^5.7.0
  retrofit:
    ^4.4.0

    # Map & location
  flutter_map: ^7.0.2
  geolocator: ^13.0.1
  latlong2:
    ^0.9.1

    # Utils
  equatable:
    ^2.0.5

    # Local DB
  drift: ^2.33.0
  #sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Mappers
  auto_mappr_annotation:
    ^2.0.0

    # Hooks
  flutter_hooks: ^0.20.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code gen
  build_runner: ^2.4.12
  freezed: ^3.0.0

  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  auto_route_generator: ^10.5.0
  retrofit_generator: ^10.2.6
  auto_mappr: ^2.0.0
  drift_dev:
    ^2.33.0

    # Tests
  mockito: ^5.4.4
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
